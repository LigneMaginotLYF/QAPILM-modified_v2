# =============================================================
# config.yaml -- Base configuration for QAPILM rectangular solver
# Edit this file to change the default problem/model/solver setup.
# Values here are overridden per-run by entries in sweep.yaml.
# =============================================================

# ------------------------------------------------------------------
# Problem configuration  (geometry, material, BCs, fluctuation)
# ------------------------------------------------------------------
problem:
  # Domain dimensions (metres)
  Lh: 10.0        # horizontal (x) length
  Lv: 5.0         # vertical  (z) length
  Lt: 2.0         # total simulation time (years)

  # FD grid resolution [dx, dz]
  spatial_reso: [0.2, 0.2]

  # Anisotropy ratio C_v / C_h
  Rcv: 1.0

  # Spatial fluctuation standard deviation
  sigma: 0.3

  # Trend polynomial coefficients  [a0, ax, az, axx, azz, axz]
  coeft: [-1, -0.5, 1, 0.5, 2, -0.2]

  # Initial excess pore-water pressure
  u0: 1.0

  # CFL stability factor (fraction of theoretical maximum dt)
  alpha: 0.05

  # Offset constant used in C field construction
  const: -1.0

  # External CSV files for pre-generated fluctuation fields.
  # Set regen_fluc: true to ignore these and generate fresh random fields.
  # Change filedir to a relative path (e.g. "./data/") or absolute path
  # appropriate for your system.  The default below is a placeholder.
  filedir: "./data/"
  file_rawS: "rawSlistA-0.3sig-2by2.csv"
  file_Lmat: "Lmat-2by2.csv"

  # Boundary conditions [top, bot, left, right].
  # 0 = Dirichlet (free-draining),  1 = Neumann (undrained / mirror).
  bcs: [0, 1, 0, 1]

  # Fluctuation controls
  regen_fluc: false   # true  → generate new random field (ignores CSV files above)
  fluc_seed: 123      # RNG seed used when regen_fluc is true (for reproducibility)

# ------------------------------------------------------------------
# Basis configuration  (parameterisation of C field)
# ------------------------------------------------------------------
basis:
  # Basis type for the C-field estimator.
  # Use a solo name or two names joined with "+".
  #
  # Solo (only that component, no automatic poly prefix):
  #   "poly"      – 6-term 2-D polynomial [1, x, z, x², z², xz]
  #   "sin"       – sine harmonics  sin(2^k · x̄) and sin(2^k · z̄)
  #   "dct"       – discrete cosine  cos(πk x̄) and cos(πk z̄)
  #   "legendre"  – Legendre polynomials P_k(x̄) and P_k(z̄)
  #   "chebyshev" – Chebyshev polynomials of the first kind T_k(x̄) and T_k(z̄)
  #   "wavelet"   – Haar wavelets
  #   "rbf"       – Gaussian radial basis functions along x and z separately
  #   "bspline"   – Uniform cubic B-splines along x and z separately
  #
  # Duo (concatenation of two components, any combination):
  #   "poly+sin", "poly+dct", "poly+legendre", "poly+chebyshev",
  #   "poly+rbf",  "poly+bspline", "rbf+bspline", etc.
  #
  # Backward-compatible alias: "poly_sin" → "poly+sin"
  type: "poly+sin"

  # Number of sine/DCT/Legendre/Chebyshev terms along each axis
  # (only used when the type includes "sin", "dct", "legendre", or "chebyshev")
  orderx: 1
  orderz: 3

  # Haar wavelet decomposition levels (only used when type includes "wavelet")
  wav_levels_x: 2
  wav_levels_z: 2

  # Gaussian RBF: number of equi-spaced centres per axis and shape parameter ε
  # (only used when type includes "rbf")
  # RBF value: exp(−ε² · (x̄ − cᵢ)²)
  rbf_centers_x: 5
  rbf_centers_z: 5
  rbf_shape: 1.0

  # B-spline: number of interior knots per axis and polynomial degree
  # (only used when type includes "bspline")
  # Total basis functions per axis = bspline_nknots + bspline_degree + 1
  bspline_nknots_x: 6
  bspline_nknots_z: 6
  bspline_degree: 3

# ------------------------------------------------------------------
# Model (training / optimisation) configuration
# ------------------------------------------------------------------
model:
  lam: 1.0        # weight for permeability (C) data loss
  lamu: 1.0       # weight for pore-pressure (u) data loss
  lr: 0.1         # Adam learning rate
  ltol: 1.0e-5    # loss convergence threshold (early stop)
  gtol: 1.0e-9    # gradient-norm convergence threshold (early stop)
  itol: 500       # maximum optimisation epochs

  # Epsilon threshold for the epsilon-insensitive loss.
  # Residuals below epsilon * |observation| are treated as zero.
  # Larger epsilon → wider acceptance zone → more robustness to noise.
  epsilon: 0.1

# ------------------------------------------------------------------
# Solver configuration
# ------------------------------------------------------------------
solver:
  # memory_mode controls which solver variant is used:
  #   "full"    (legacy default) – stores full time history (high RAM).
  #   "stream"  (memory-optimized) – O(1) memory in time.
  memory_mode: "full"

  # When true the solver records u snapshots at the observation time indices.
  # Disable to reduce memory when only loss values are needed.
  store_u_snapshots: true

# ------------------------------------------------------------------
# Measurement locations
# ------------------------------------------------------------------
# ukmat  : grid-index pairs [[row, col], ...] where u is observed.
# chkmat : grid-index pairs [[row, col], ...] where C is observed.
# These are used for both truth extraction and loss evaluation.
measurements:
  ukmat:   [[5, 10], [10, 20], [15, 30], [20, 40]]
  chkmat:  [[5, 10], [20, 40]]

  # Observation time step indices (into the FD time axis)
  ukt: [100, 200, 300, 400, 500]

# ------------------------------------------------------------------
# Monte Carlo configuration
# ------------------------------------------------------------------
monte_carlo:
  # Number of Monte Carlo restarts for the inverse solver.
  # Each restart uses independent random initial coefficients.
  # N_mc = 1 (default) reproduces the original single-run behaviour.
  #
  # For N_mc > 1:
  #   - The inverse solver is run N_mc times with independent random inits.
  #   - Each realization: decode coefficients → C field → run forward solver → U field.
  #   - Mean C  = pointwise mean over all N_mc decoded C fields (NOT averaged weights).
  #   - Mean U  = pointwise mean over all N_mc forward-solver U outputs.
  #   - Std C / Std U are also computed for the confidence band in plotting.
  #   - Confidence band = mean ± BAND_K * std (set BAND_K in the plotting scripts).
  N_mc: 1

# ------------------------------------------------------------------
# Run / output configuration
# ------------------------------------------------------------------
run:
  results_dir: "./results"  # parent folder; each batch run creates a sub-folder here
  save_losses: true
  loss_file: "QAPILM_Eps_loss.npy"
  coeffs_csv: "coeffs_batch.csv"  # summary CSV written at the end of a batch sweep

# ------------------------------------------------------------------
# Randomize option
# ------------------------------------------------------------------
# Controls optional randomization applied before each experiment run.
# Default mode is "none" (backward compatible, no randomization).
#
# mode: "none"      – no randomization (default)
#       "coeft"     – replace ground-truth trend coefficients with N(0,1)
#                     random values (same number of coefficients preserved)
#       "locations" – replace ukmat / chkmat with random grid positions
#                     (same number of measurement points preserved)
# seed: integer seed for reproducibility; 0 = leave the RNG unseeded
# ------------------------------------------------------------------
randomize:
  mode: "none"
  seed: 0

# ------------------------------------------------------------------
# Plot-output configuration
# ------------------------------------------------------------------
# Controls additional output files written by run_batch.py that are
# needed by the batch plotting scripts in tools/.
#
# snapshot_years  : list of physical times (in years) at which U field
#                   snapshots are saved for each MC run.
# monitor_points  : list of [row, col] grid-index pairs at which U temporal
#                   evolution is tracked across all time steps.
# ------------------------------------------------------------------
plot_output:
  snapshot_years: [0.1, 1.0, 2.0]
  monitor_points:
    - [10, 25]
    - [5, 10]
